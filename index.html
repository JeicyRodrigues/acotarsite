<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página Inicial</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Lexend+Peta:wght@100..900&family=Poiret+One&family=Uncial+Antiqua&display=swap"
        rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background-color: #ffffff;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background-image: url('imagens/velaris03.png');
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
            opacity: 1.5;
        }

        h1 {
            font-family: 'Cinzel Decorative', cursive;
            color: #c2a368;
            text-align: center;
            margin-top: 50px;
            margin-bottom: 0%;
            font-size: 80px;
            padding: auto;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
            filter: drop-shadow(0 0 10px rgba(194, 163, 104, 0.5));
        }

        h2 {
            font-family: "Poiret One", sans-serif;
            color: #f0e6d2;
            text-align: right;
            margin-top: -15px;
            font-size: 20px;
            margin-right: 10%;
            padding: auto;
            font-style: italic;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.7);
        }




        aside {
            position: fixed;
            left: 10%;
            top: 50%;
            transform: translateY(-50%);
            display: block;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            font-family: "Poiret One", sans-serif;
            font-size: 20px;
            z-index: 10;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(5px);
            border-right: 1px solid rgba(194, 163, 104, 0.3);
            border-radius: 0 15px 15px 0;
        }

        aside ul {
            display: flex;
            flex-direction: column;
            list-style: none;
            padding: 25px;
            gap: 30px;
            display: flex;
            list-style: none;
            padding: 0;
            gap: 20px;
            text-decoration: none;
            color: inherit;
            
        }

      

        aside a {
            text-decoration: none;
            color: #f0e6d2;
            transition: 0.3s;

        }

        aside a:hover {
            color: #c2a368;
        }
    </style>

</head>

<body>
    <header>

        <nav>
            <h1>Acotar</h1>
            <h2>" to the stars who listen—and the dreams that are answered... "</h2>

        </nav>
    </header>

    </aside>

    </ul>


</body>

</html>
